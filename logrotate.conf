# OpenClaw 日志轮转配置
# 放置位置：/etc/logrotate.d/openclaw

/var/log/openclaw-*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 644 root root
    postrotate
        # 可选：日志轮转后执行的操作
        echo "日志已轮转：$(date '+%Y-%m-%d %H:%M:%S')" >> /var/log/openclaw-rotate.log
    endscript
}

/var/log/openclaw/workspace/memory/sessions/*.md {
    weekly
    rotate 4
    compress
    missingok
    notifempty
    create 644 root root
}
